<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🍕 Food Quiz Tic-Tac-Toe 🍦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #f093fb 50%, #f5576c 100%);
            --card-bg: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #4a5568;
            --accent-pink: #ff6b9d;
            --accent-blue: #4facfe;
            --accent-yellow: #ffd93d;
            --accent-green: #6bcb77;
            --accent-purple: #9d50dd;
            --shadow-soft: 0 8px 25px rgba(0,0,0,0.15);
            --shadow-hover: 0 12px 35px rgba(0,0,0,0.25);
            --border-radius: 20px;
            --border-radius-sm: 12px;
            --font-title: 'Baloo 2', cursive;
            --font-body: 'Fredoka', sans-serif;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            user-select: none;
        }
        
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            background: var(--bg-gradient);
            color: var(--text-primary);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animated background bubbles */
        .bg-bubbles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            animation: float-up 15s infinite ease-in;
        }
        
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-120vh) scale(0.5); opacity: 0; }
        }

        /* --- Header --- */
        header {
            width: 100%;
            max-width: 600px;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .brand {
            font-family: var(--font-title);
            font-weight: 700;
            font-size: clamp(1.3rem, 5vw, 2rem);
            background: linear-gradient(45deg, var(--accent-yellow), var(--accent-pink), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        button {
            background: white;
            border: 3px solid var(--accent-blue);
            color: var(--text-primary);
            padding: 0.6rem 1rem;
            border-radius: 50px;
            font-family: var(--font-title);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-soft);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            background: var(--accent-blue);
            color: white;
        }

        button.primary {
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple));
            border-color: var(--accent-pink);
            color: white;
        }
        
        button.primary:hover {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-pink));
            transform: translateY(-3px) scale(1.05);
        }

        button.preview {
            border-color: var(--accent-yellow);
            background: var(--accent-yellow);
            color: var(--text-primary);
        }
        
        button.preview:hover {
            background: var(--accent-green);
            border-color: var(--accent-green);
        }

        button.close-modal {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            padding: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-pink);
            border-color: var(--accent-pink);
            color: white;
        }
        
        button.close-modal:hover {
            background: var(--accent-purple);
            transform: rotate(90deg);
        }

        /* --- Status Banner --- */
        #status-banner {
            min-height: 2.8rem;
            width: 90%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--font-title);
            font-weight: 700;
            font-size: 1.1rem;
            background: white;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-soft);
            margin: 0.5rem 0;
            padding: 0.5rem 1rem;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            text-align: center;
        }
        #status-banner.visible { 
            opacity: 1; 
            transform: translateY(0);
        }
        #status-banner.win { 
            background: linear-gradient(45deg, var(--accent-yellow), var(--accent-green));
            color: white;
        }

        /* --- Game Board --- */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            z-index: 5;
            padding: 0.5rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 92vmin;
            height: 92vmin;
            max-width: 480px;
            max-height: 480px;
            padding: 12px;
            background: white;
            box-shadow: var(--shadow-hover);
            border-radius: var(--border-radius);
            position: relative;
            border: 4px solid white;
        }

        .cell {
            background: linear-gradient(145deg, #f0f4ff, #e6eeff);
            border: 4px dashed var(--accent-blue);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(2.5rem, 10vmin, 5rem);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at center, rgba(255,255,255,0.8) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .cell:hover:not(.taken) {
            background: linear-gradient(145deg, #e6eeff, #d9e4ff);
            border-style: solid;
            border-color: var(--accent-pink);
            transform: scale(1.03);
        }

        .cell:hover:not(.taken)::before {
            opacity: 1;
        }

        .cell.taken { 
            cursor: default; 
            animation: pop-in 0.3s ease;
        }
        
        @keyframes pop-in {
            0% { transform: scale(0.8); opacity: 0.5; }
            70% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .cell.win-highlight {
            background: linear-gradient(45deg, var(--accent-yellow), var(--accent-green)) !important;
            border-color: white !important;
            animation: win-pulse 0.8s ease infinite;
        }

        @keyframes win-pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 217, 61, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 217, 61, 0); }
        }

        /* Fun emojis for X and O */
        .glyph-emoji {
            font-size: clamp(2rem, 8vmin, 4rem);
            filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.2));
            animation: bounce-in 0.4s ease;
        }
        
        @keyframes bounce-in {
            0% { transform: scale(0) rotate(-180deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* --- Scoreboard --- */
        .scoreboard {
            width: 90%;
            max-width: 600px;
            padding: 0.8rem;
            display: flex;
            justify-content: space-around;
            background: white;
            border-radius: var(--border-radius-sm);
            box-shadow: var(--shadow-soft);
            margin-bottom: 1rem;
            font-family: var(--font-title);
            z-index: 5;
        }

        .score-box {
            text-align: center;
            padding: 0.3rem 0.8rem;
            border-radius: 12px;
            background: linear-gradient(145deg, #f8f9ff, #eef1ff);
        }

        .score-val {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        /* --- Modal Base --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(102, 126, 234, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(8px);
            padding: 1rem;
            cursor: pointer;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 1.8rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slide-up 0.3s ease;
            cursor: default;
        }
        
        @keyframes slide-up {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-title {
            font-family: var(--font-title);
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
            background: linear-gradient(45deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        select {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(145deg, #f8f9ff, #eef1ff);
            border: 2px solid var(--accent-blue);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        select:focus {
            outline: none;
            border-color: var(--accent-pink);
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.2);
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            margin-top: 1.5rem;
            gap: 0.8rem;
        }

        /* --- Quiz Modal --- */
        .quiz-question {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.4;
            padding: 0.5rem;
            background: linear-gradient(145deg, #fff9e6, #fff3cc);
            border-radius: 12px;
            border: 2px dashed var(--accent-yellow);
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-btn {
            width: 100%;
            padding: 1rem 1.2rem;
            background: linear-gradient(145deg, #f0f4ff, #e6eeff);
            border: 3px solid var(--accent-blue);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            font-family: var(--font-title);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-soft);
        }

        .quiz-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            background: var(--accent-blue);
            color: white;
            border-color: white;
        }

        .quiz-btn:active {
            transform: translateY(-1px);
        }

        #quiz-feedback {
            margin-top: 1.2rem;
            text-align: center;
            font-weight: 700;
            font-size: 1.3rem;
            font-family: var(--font-title);
            min-height: 2rem;
            padding: 0.5rem;
            border-radius: 12px;
        }

        .feedback-success { 
            color: var(--accent-green); 
            background: rgba(107, 203, 119, 0.15);
            animation: celebrate 0.5s ease;
        }
        
        .feedback-error { 
            color: var(--accent-pink); 
            background: rgba(255, 107, 157, 0.15);
            animation: shake 0.4s ease;
        }
        
        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* --- Preview Modal --- */
        .preview-list {
            max-height: 50vh;
            overflow-y: auto;
            padding-right: 0.5rem;
        }
        
        .preview-item {
            padding: 0.8rem;
            margin-bottom: 0.8rem;
            background: linear-gradient(145deg, #f8f9ff, #eef1ff);
            border-radius: 12px;
            border-left: 4px solid var(--accent-blue);
        }
        
        .preview-question {
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-primary);
        }
        
        .preview-options {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .preview-option {
            padding: 0.3rem 0.7rem;
            background: white;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--accent-blue);
        }
        
        .preview-option.correct {
            background: var(--accent-green);
            color: white;
            border-color: var(--accent-green);
        }

        /* --- Canvas --- */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Accessibility */
        .sr-only {
            position: absolute;
            width: 1px; height: 1px;
            padding: 0; margin: -1px;
            overflow: hidden;
            clip: rect(0,0,0,0);
            border: 0;
        }
        
        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-pink); }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-bubbles" id="bg-bubbles"></div>

    <header>
        <div class="brand">
            🍕 Food Quiz Game! 🍦
        </div>
        <div class="controls">
            <button onclick="ui.togglePreview(true)">📋 Preview</button>
            <button onclick="ui.toggleModal(true)">⚙️ Settings</button>
            <button class="primary" onclick="game.newRound()">🔄 New Game</button>
        </div>
    </header>

    <div id="status-banner" role="status" aria-live="polite">🎲 Your Turn!</div>

    <main>
        <div class="board" id="board" role="grid" aria-label="Tic Tac Toe Board">
            <!-- Cells generated by JS -->
        </div>
    </main>

    <div class="scoreboard">
        <div class="score-box">
            <div class="score-val" id="score-p1">0</div>
            <div class="score-label">⭐ You</div>
        </div>
        <div class="score-box">
            <div class="score-val" id="score-draw">0</div>
            <div class="score-label">🤝 Ties</div>
        </div>
        <div class="score-box">
            <div class="score-val" id="score-p2">0</div>
            <div class="score-label">🤖 Robot</div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal" onclick="ui.closeModalOnOverlay(event, 'settings')">
        <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <button class="close-modal" onclick="ui.toggleModal(false)" aria-label="Close settings">✖️</button>
            <h2 class="modal-title" id="modal-title">✨ Game Settings ✨</h2>
            
            <div class="form-group">
                <label for="mode-select">👥 Who do you want to play with?</label>
                <select id="mode-select">
                    <option value="pvp">👫 Two Friends</option>
                    <option value="ai">🤖 Play vs Robot</option>
                </select>
            </div>

            <div class="form-group" id="ai-diff-group">
                <label for="ai-diff-select">🧠 How smart is the robot?</label>
                <select id="ai-diff-select">
                    <option value="reckless">😜 Easy (Beginner)</option>
                    <option value="pragmatic">🤔 Medium (Challenging)</option>
                    <option value="perfect">🏆 Hard (Super Smart!)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="first-move-select">🎲 Who goes first?</label>
                <select id="first-move-select">
                    <option value="X">🌟 You (Star)</option>
                    <option value="O">🌙 Robot (Moon)</option>
                </select>
            </div>

            <div class="modal-actions">
                <button class="primary" onclick="ui.saveSettings()">✅ Let's Play!</button>
            </div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div class="modal-overlay" id="quiz-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="quizSystem.skipQuiz()" aria-label="Close quiz">✖️</button>
            <h2 class="modal-title">🎓 Food Quiz Time! 🎓</h2>
            <p class="quiz-question" id="quiz-question-text">Question goes here?</p>
            <div class="quiz-options" id="quiz-options-container">
                <!-- Buttons injected here -->
            </div>
            <p id="quiz-feedback"></p>
        </div>
    </div>

    <!-- Preview Modal -->
    <div class="modal-overlay" id="preview-modal" onclick="ui.togglePreview(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-modal" onclick="ui.togglePreview(false)" aria-label="Close preview">✖️</button>
            <h2 class="modal-title">📚 All Food Questions 📚</h2>
            <div class="preview-list" id="preview-list">
                <!-- Questions injected here -->
            </div>
            <div class="modal-actions">
                <button class="primary" onclick="ui.togglePreview(false)">👍 Got it!</button>
            </div>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script>
        // --- Quiz Data: FOOD TOPIC, Grade 4, some/any only ---
        const quizData = [
            {q: "I have ___ apples. 🍎", options: ["some", "any"], correct: 0},
            {q: "Do you have ___ bread? 🍞", options: ["some", "any"], correct: 1},
            {q: "There aren't ___ cookies left. 🍪", options: ["some", "any"], correct: 1},
            {q: "Would you like ___ pizza? 🍕", options: ["some", "any"], correct: 0},
            {q: "She doesn't have ___ bananas. 🍌", options: ["some", "any"], correct: 1},
            {q: "Can I have ___ water? 💧", options: ["some", "any"], correct: 0},
            {q: "Are there ___ eggs in the fridge? 🥚", options: ["some", "any"], correct: 1},
            {q: "We need to buy ___ cheese. 🧀", options: ["some", "any"], correct: 0},
            {q: "He never eats ___ vegetables. 🥦", options: ["some", "any"], correct: 1},
            {q: "Is there ___ milk? 🥛", options: ["some", "any"], correct: 1},
            {q: "I saw ___ candies on the table. 🍬", options: ["some", "any"], correct: 0},
            {q: "They don't have ___ juice. 🧃", options: ["some", "any"], correct: 1},
            {q: "Could you give me ___ cake? 🎂", options: ["some", "any"], correct: 0},
            {q: "There are ___ oranges in the bowl. 🍊", options: ["some", "any"], correct: 0},
            {q: "Do you want ___ ice cream? 🍦", options: ["some", "any"], correct: 0},
            {q: "I can't find ___ cookies anywhere. 🍪", options: ["some", "any"], correct: 1},
            {q: "We have ___ sandwiches for lunch. 🥪", options: ["some", "any"], correct: 0},
            {q: "Are there ___ grapes in the kitchen? 🍇", options: ["some", "any"], correct: 1},
            {q: "She bought ___ strawberries yesterday. 🍓", options: ["some", "any"], correct: 0},
            {q: "There isn't ___ yogurt in the fridge. 🥄", options: ["some", "any"], correct: 1}
        ];

        // --- Create Background Bubbles ---
        function createBubbles() {
            const container = document.getElementById('bg-bubbles');
            const colors = ['#ff6b9d', '#4facfe', '#ffd93d', '#6bcb77', '#9d50dd'];
            
            for (let i = 0; i < 15; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                const size = Math.random() * 60 + 20;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}%`;
                bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
                bubble.style.animationDuration = `${Math.random() * 10 + 10}s`;
                bubble.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(bubble);
            }
        }

        // --- Game Logic ---
        const game = {
            board: Array(9).fill(null),
            currentPlayer: 'X',
            gameActive: true,
            scores: { X: 0, O: 0, Draw: 0 },
            settings: {
                mode: 'pvp',
                aiDifficulty: 'reckless',
                firstMove: 'X'
            },
            pendingMoveIndex: null,
            winningCombos: [
                [0,1,2], [3,4,5], [6,7,8],
                [0,3,6], [1,4,7], [2,5,8],
                [0,4,8], [2,4,6]
            ],

            init() {
                createBubbles();
                this.loadSettings();
                ui.renderBoard();
                ui.updateScoreboard();
                this.checkFirstMove();
            },

            checkFirstMove() {
                if (this.settings.mode === 'ai' && this.settings.firstMove === 'O') {
                    this.gameActive = true;
                    setTimeout(() => this.makeAiMove(), 800);
                }
            },

            handleCellClick(index) {
                if (!this.gameActive || this.board[index]) return;
                if (this.settings.mode === 'ai' && this.currentPlayer !== 'X') return;

                this.pendingMoveIndex = index;
                quizSystem.startQuiz();
            },

            executeMove(index) {
                this.board[index] = this.currentPlayer;
                ui.updateCell(index);

                if (this.checkWin()) {
                    this.endGame(false);
                } else if (this.board.every(cell => cell !== null)) {
                    this.endGame(true);
                } else {
                    this.switchTurn();
                }
            },

            switchTurn() {
                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                const playerName = this.currentPlayer === 'X' ? '🌟 You' : '🌙 Robot';
                ui.updateStatus(`🎲 ${playerName}'s Turn!`);

                if (this.settings.mode === 'ai' && this.currentPlayer === 'O' && this.gameActive) {
                    setTimeout(() => this.makeAiMove(), 700);
                }
            },

            makeAiMove() {
                if (!this.gameActive) return;

                let moveIndex;
                const difficulty = this.settings.aiDifficulty;
                const rand = Math.random();

                if (difficulty === 'reckless' && rand > 0.2) {
                    moveIndex = this.getRandomMove();
                } else if (difficulty === 'pragmatic' && rand > 0.7) {
                    moveIndex = this.getRandomMove();
                } else {
                    moveIndex = this.getBestMove();
                }

                this.executeMove(moveIndex);
            },

            getRandomMove() {
                const available = this.board.map((v, i) => v === null ? i : null).filter(v => v !== null);
                return available[Math.floor(Math.random() * available.length)];
            },

            getBestMove() {
                let bestScore = -Infinity;
                let move;
                
                for (let i = 0; i < 9; i++) {
                    if (this.board[i] === null) {
                        this.board[i] = 'O';
                        let score = this.minimax(this.board, 0, false);
                        this.board[i] = null;
                        if (score > bestScore) {
                            bestScore = score;
                            move = i;
                        }
                    }
                }
                return move;
            },

            minimax(board, depth, isMaximizing) {
                const result = this.checkWinnerState(board);
                if (result === 'O') return 10 - depth;
                if (result === 'X') return depth - 10;
                if (result === 'Draw') return 0;

                if (isMaximizing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === null) {
                            board[i] = 'O';
                            let score = this.minimax(board, depth + 1, false);
                            board[i] = null;
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === null) {
                            board[i] = 'X';
                            let score = this.minimax(board, depth + 1, true);
                            board[i] = null;
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            },

            checkWinnerState(board) {
                for (let combo of this.winningCombos) {
                    const [a, b, c] = combo;
                    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                        return board[a];
                    }
                }
                if (board.every(cell => cell !== null)) return 'Draw';
                return null;
            },

            checkWin() {
                for (let combo of this.winningCombos) {
                    const [a, b, c] = combo;
                    if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                        ui.highlightWin(combo);
                        return true;
                    }
                }
                return false;
            },

            endGame(isDraw) {
                this.gameActive = false;
                if (isDraw) {
                    this.scores.Draw++;
                    ui.updateStatus("🤝 It's a Tie! Great job!", true);
                } else {
                    const winner = this.currentPlayer === 'X' ? '🌟 You' : '🌙 Robot';
                    this.scores[this.currentPlayer]++;
                    ui.updateStatus(`🎉 ${winner} Wins! Amazing!`, true);
                    confetti.start();
                }
                ui.updateScoreboard();
            },

            newRound() {
                this.board.fill(null);
                this.gameActive = true;
                this.currentPlayer = this.settings.firstMove;
                ui.clearBoard();
                ui.hideStatus();
                confetti.stop();
                this.checkFirstMove();
                if(this.settings.mode === 'pvp') {
                    const playerName = this.currentPlayer === 'X' ? '🌟 You' : '🌙 Friend';
                    ui.updateStatus(`🎲 ${playerName}'s Turn!`);
                }
            },

            resetScores() {
                this.scores = { X: 0, O: 0, Draw: 0 };
                ui.updateScoreboard();
                this.newRound();
            },

            loadSettings() {
                const saved = localStorage.getItem('foodQuizGame_settings');
                if (saved) {
                    this.settings = { ...this.settings, ...JSON.parse(saved) };
                }
            },
            
            saveSettingsToStorage() {
                localStorage.setItem('foodQuizGame_settings', JSON.stringify(this.settings));
            },
            
            applySettings(newSettings) {
                this.settings = { ...this.settings, ...newSettings };
                this.saveSettingsToStorage();
                
                const p1Label = this.settings.mode === 'ai' ? '🤖 Robot' : '👫 Friend';
                document.getElementById('label-p2').textContent = p1Label;

                document.getElementById('ai-diff-group').style.display = 
                    this.settings.mode === 'ai' ? 'block' : 'none';

                this.resetScores();
            }
        };

        // --- Quiz System ---
        const quizSystem = {
            modal: document.getElementById('quiz-modal'),
            questionText: document.getElementById('quiz-question-text'),
            optionsContainer: document.getElementById('quiz-options-container'),
            feedback: document.getElementById('quiz-feedback'),

            startQuiz() {
                const qIndex = Math.floor(Math.random() * quizData.length);
                const qData = quizData[qIndex];

                this.questionText.textContent = qData.q;
                this.optionsContainer.innerHTML = '';
                this.feedback.textContent = '';
                this.feedback.className = '';

                // Shuffle options for variety
                const shuffled = qData.options.map((opt, idx) => ({opt, idx}))
                    .sort(() => Math.random() - 0.5);

                shuffled.forEach(item => {
                    const btn = document.createElement('button');
                    btn.className = 'quiz-btn';
                    btn.textContent = item.opt;
                    btn.onclick = () => this.checkAnswer(item.idx, qData.correct);
                    this.optionsContainer.appendChild(btn);
                });

                this.modal.classList.add('active');
            },
            
            skipQuiz() {
                // Allow skipping quiz to keep game flowing
                this.modal.classList.remove('active');
                if (game.pendingMoveIndex !== null) {
                    game.executeMove(game.pendingMoveIndex);
                    game.pendingMoveIndex = null;
                }
            },

            checkAnswer(selectedIndex, correctIndex) {
                if (selectedIndex === correctIndex) {
                    this.feedback.textContent = "🎉 CORRECT! Yummy! 🎉";
                    this.feedback.className = "feedback-success";
                    
                    Array.from(this.optionsContainer.children).forEach(b => b.disabled = true);

                    setTimeout(() => {
                        this.modal.classList.remove('active');
                        if (game.pendingMoveIndex !== null) {
                            game.executeMove(game.pendingMoveIndex);
                            game.pendingMoveIndex = null;
                        }
                    }, 1000);

                } else {
                    this.feedback.textContent = "💪 Try again! You can do it! 💪";
                    this.feedback.className = "feedback-error";
                    
                    setTimeout(() => {
                        this.startQuiz();
                    }, 1200);
                }
            }
        };

        // --- UI Controller ---
        const ui = {
            boardEl: document.getElementById('board'),
            statusEl: document.getElementById('status-banner'),
            
            renderBoard() {
                this.boardEl.innerHTML = '';
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.setAttribute('role', 'gridcell');
                    cell.setAttribute('aria-label', `Cell ${i+1}`);
                    cell.setAttribute('tabindex', '0');
                    cell.dataset.index = i;
                    
                    cell.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            game.handleCellClick(i);
                        }
                    });
                    
                    cell.addEventListener('click', () => game.handleCellClick(i));
                    this.boardEl.appendChild(cell);
                }
            },

            updateCell(index) {
                const cell = this.boardEl.children[index];
                const player = game.board[index];
                cell.classList.add('taken');
                cell.innerHTML = this.getGlyph(player);
                cell.setAttribute('aria-label', `Cell ${index+1}, ${player === 'X' ? 'Star' : 'Moon'}`);
            },

            clearBoard() {
                Array.from(this.boardEl.children).forEach(cell => {
                    cell.className = 'cell';
                    cell.innerHTML = '';
                    cell.setAttribute('aria-label', `Cell ${parseInt(cell.dataset.index)+1}`);
                });
            },

            getGlyph(player) {
                if (player === 'X') return '<span class="glyph-emoji">⭐</span>';
                if (player === 'O') return '<span class="glyph-emoji">🌙</span>';
                return '';
            },

            highlightWin(combo) {
                combo.forEach(index => {
                    this.boardEl.children[index].classList.add('win-highlight');
                });
            },

            updateStatus(msg, isWin = false) {
                this.statusEl.textContent = msg;
                this.statusEl.classList.add('visible');
                if (isWin) {
                    this.statusEl.classList.add('win');
                } else {
                    this.statusEl.classList.remove('win');
                }
            },

            hideStatus() {
                this.statusEl.classList.remove('visible', 'win');
            },

            updateScoreboard() {
                document.getElementById('score-p1').textContent = game.scores.X;
                document.getElementById('score-p2').textContent = game.scores.O;
                document.getElementById('score-draw').textContent = game.scores.Draw;
            },

            toggleModal(show) {
                const modal = document.getElementById('settings-modal');
                if (show) {
                    document.getElementById('mode-select').value = game.settings.mode;
                    document.getElementById('ai-diff-select').value = game.settings.aiDifficulty;
                    document.getElementById('first-move-select').value = game.settings.firstMove;
                    document.getElementById('ai-diff-group').style.display = 
                        game.settings.mode === 'ai' ? 'block' : 'none';
                    modal.classList.add('active');
                } else {
                    modal.classList.remove('active');
                }
            },
            
            // NEW: Close modal when clicking overlay
            closeModalOnOverlay(event, modalName) {
                if (event.target.id === `${modalName}-modal`) {
                    this.toggleModal(false);
                }
            },

            togglePreview(show) {
                const modal = document.getElementById('preview-modal');
                const list = document.getElementById('preview-list');
                
                if (show) {
                    list.innerHTML = quizData.map((q, i) => `
                        <div class="preview-item">
                            <div class="preview-question">${i+1}. ${q.q}</div>
                            <div class="preview-options">
                                ${q.options.map((opt, idx) => 
                                    `<span class="preview-option ${idx === q.correct ? 'correct' : ''}">${opt}</span>`
                                ).join('')}
                            </div>
                        </div>
                    `).join('');
                    modal.classList.add('active');
                } else {
                    modal.classList.remove('active');
                }
            },

            saveSettings() {
                const newSettings = {
                    mode: document.getElementById('mode-select').value,
                    aiDifficulty: document.getElementById('ai-diff-select').value,
                    firstMove: document.getElementById('first-move-select').value
                };
                game.applySettings(newSettings);
                // FIXED: Explicitly close modal after saving
                this.toggleModal(false);
            }
        };

        // --- Confetti System (Canvas) ---
        const confetti = {
            canvas: document.getElementById('confetti-canvas'),
            ctx: document.getElementById('confetti-canvas').getContext('2d'),
            particles: [],
            animationId: null,
            active: false,

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            },

            start() {
                if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
                this.active = true;
                this.resize();
                this.particles = [];
                
                const colors = ['#ff6b9d', '#4facfe', '#ffd93d', '#6bcb77', '#9d50dd', '#ff9f43'];
                
                for(let i = 0; i < 120; i++) {
                    this.particles.push({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height - this.canvas.height,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        size: Math.random() * 6 + 4,
                        speedY: Math.random() * 4 + 2,
                        speedX: Math.random() * 3 - 1.5,
                        rotation: Math.random() * 360,
                        rotationSpeed: Math.random() * 12 - 6,
                        shape: Math.random() > 0.5 ? 'circle' : 'square'
                    });
                }
                this.animate();
            },

            stop() {
                this.active = false;
                cancelAnimationFrame(this.animationId);
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            },

            animate() {
                if (!this.active) return;
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.particles.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += p.rotationSpeed;

                    if (p.y > this.canvas.height + 20) {
                        p.y = -20;
                        p.x = Math.random() * this.canvas.width;
                    }

                    this.ctx.save();
                    this.ctx.translate(p.x, p.y);
                    this.ctx.rotate(p.rotation * Math.PI / 180);
                    this.ctx.fillStyle = p.color;
                    
                    if (p.shape === 'circle') {
                        this.ctx.beginPath();
                        this.ctx.arc(0, 0, p.size/2, 0, Math.PI * 2);
                        this.ctx.fill();
                    } else {
                        this.ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    }
                    this.ctx.restore();
                });

                this.animationId = requestAnimationFrame(() => this.animate());
            }
        };

        window.addEventListener('resize', () => confetti.resize());
        window.addEventListener('load', () => {
            game.init();
            confetti.resize();
        });

    </script>
</body>
